

version: "3.9"


services:


  ollama:

    image: ollama/ollama:latest

    ports:
      - "11434:11434"

    volumes:
      - ollama_data:/root/.ollama



  app:

    build: .

    ports:
      - "8501:8501"


    environment:

      OLLAMA_BASE_URL: http://ollama:11434

      OLLAMA_MODEL: qwen2.5:7b


    volumes:

      - ./data:/app/data

      - ./chroma_db:/app/chroma_db


    depends_on:

      - ollama



volumes:

  ollama_data: